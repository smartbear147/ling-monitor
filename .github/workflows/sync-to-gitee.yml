name: Sync to Gitee

on:
  push:
    branches:
      - main  # 或者你的默认主分支名

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取所有提交历史，确保完整克隆

      - name: Setup Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Push to Gitee
        run: |
          # 添加 Gitee 远程仓库
          git remote add gitee https://${{ secrets.GITEE_USERNAME }}:${{ secrets.GITEE_PASSWORD }}@gitee.com/smartbear14/ling-monitor.git
          # 强制推送到 Gitee（注意：这会覆盖 Gitee 端的内容）
          git push -f gitee main:main